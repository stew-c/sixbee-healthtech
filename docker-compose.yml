services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sixbee
      POSTGRES_USER: sixbee
      POSTGRES_PASSWORD: sixbee
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sixbee"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:

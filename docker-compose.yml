services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sixbee
      POSTGRES_USER: sixbee
      POSTGRES_PASSWORD: sixbee
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sixbee"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    ports:
      - "5050:5000"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=sixbee;Username=sixbee;Password=sixbee"
      Jwt__Secret: "YourSuperSecretKeyThatIsAtLeast32Characters!"
      Jwt__Issuer: "SixBee.Auth"
      Jwt__Audience: "SixBee.Admin"
      Jwt__ExpiryInMinutes: "120"
      Cors__Origins__0: "http://localhost:3000"
      Cors__Origins__1: "http://localhost:3001"
    depends_on:
      db:
        condition: service_healthy

  patient-app:
    build:
      context: ./src/patient-app
    ports:
      - "3000:3000"
    depends_on:
      - api

  admin-app:
    build:
      context: ./src/admin-app
    ports:
      - "3001:3001"
    depends_on:
      - api

volumes:
  db-data:
